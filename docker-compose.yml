services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENABLE_DEMO_LOGIN_PREFILL: ${ENABLE_DEMO_LOGIN_PREFILL:-false}
    container_name: arc_mono_app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=${POSTGRES_DB:-arc_mono_db};Username=${POSTGRES_USER:-arc_mono_user};Password=${POSTGRES_PASSWORD:-arc_mono_password}
    ports:
      - "5266:5266"

  postgres:
    image: postgres:16-alpine
    container_name: arc_mono_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arc_mono_db}
      POSTGRES_USER: ${POSTGRES_USER:-arc_mono_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arc_mono_password}
    ports:
      - "5432:5432"
    volumes:
      - arc_mono_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arc_mono_user} -d ${POSTGRES_DB:-arc_mono_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  arc_mono_postgres_data: